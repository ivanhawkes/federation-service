application: ss-federation
module: federation
version: v1
runtime: go
api_version: go1
# instance_class: B1
# basic_scaling:
#   max_instances: 1
#   idle_timeout: 10m
default_expiration: "30d"

handlers:

# ----------
# SITE ADMIN
# ----------

- url: /_ah/spi/.*
  script: _go_app

# -------
# SWAGGER
# -------

- url: /apidocs\.json
  script: _go_app

- url: /apidoc
  static_dir: static/swagger
  application_readable: true

# - url: /apidoc # swagger uses relative links, so although the HTML file is served, nothing displays.
#   static_files: static/swagger/index.html
#   upload: static/swagger/index.html

- url: /apidoc/
  static_files: static/swagger/index.html
  upload: static/swagger/index.html

# ---------------------------
# LOGIN REQUIRED LANDING PAGE
# ---------------------------

- url: /_ah/login_required
  script: _go_app

# -------
# API
# Access to the API.
# -------

- url: /federation/.*
  script: _go_app

# # -------------------
# # CLIENT REGISTRATION
# # -------------------

- url: /register
  script: _go_app

# -------
# TESTING
# -------

# TEST: some test page.
- url: /test/.*
  script: _go_app

# --------------------------
# BEGIN STATIC FILE HANDLERS
# --------------------------

# - url: /(.*\.(appcache|manifest))
#   mime_type: text/cache-manifest
#   static_files: static/\1
#   upload: static/(.*\.(appcache|manifest))
#   expiration: "0m"

- url: /(.*\.css)
  mime_type: text/css
  static_files: static/\1
  upload: static/(.*\.css)

- url: /(.*\.html)
  mime_type: text/html
  static_files: static/\1
  upload: static/(.*\.html)
  expiration: "1h"

# - url: /(.*\.eot)
#   mime_type: application/vnd.ms-fontobject
#   static_files: static/\1
#   upload: static/(.*\.eot)

- url: /(.*\.ico)
  mime_type: image/x-icon
  static_files: static/\1
  upload: static/(.*\.ico)
  expiration: "7d"

- url: /(.*\.js)
  mime_type: text/javascript
  static_files: static/\1
  upload: static/(.*\.js)

# # - url: /(.*\.json)
# #   mime_type: application/json
# #   static_files: static/\1
# #   upload: static/(.*\.json)
# #   expiration: "1h"

# - url: /(.*\.otf)
#   mime_type: font/opentype
#   static_files: static/\1
#   upload: static/(.*\.otf)

# - url: /(.*\.(svg|svgz))
#   mime_type: images/svg+xml
#   static_files: static/\1
#   upload: static/(.*\.(svg|svgz))

# - url: /(.*\.swf)
#   mime_type: application/x-shockwave-flash
#   static_files: static/\1
#   upload: static/(.*\.swf)

# - url: /(.*\.ttf)
#   mime_type: font/truetype
#   static_files: static/\1
#   upload: static/(.*\.ttf)

# - url: /(.*\.txt)
#   mime_type: text/plain
#   static_files: static/\1
#   upload: static/(.*\.txt)

# - url: /(.*\.woff)
#   mime_type: application/x-font-woff
#   static_files: static/\1
#   upload: static/(.*\.woff)

# - url: /(.*\.xml)
#   mime_type: application/xml
#   static_files: static/\1
#   upload: static/(.*\.xml)
#   expiration: "1h"

# image files
- url: /(.*\.(bmp|gif|ico|jpeg|jpg|png))
  static_files: static/\1
  upload: static/(.*\.(bmp|gif|ico|jpeg|jpg|png))

# # audio files
# - url: /(.*\.(mid|midi|mp3|wav))
#   static_files: static/\1
#   upload: static/(.*\.(mid|midi|mp3|wav))  

# # compressed files
# - url: /(.*\.(bz2|gz|rar|tar|tgz|zip))
#   static_files: static/\1
#   upload: static/(.*\.(bz2|gz|rar|tar|tgz|zip))

# # index files
# - url: /(.+)/
#   static_files: static/\1/index.html
#   upload: static/(.+)/index.html
#   expiration: "15m"

# - url: /(.+)
#   static_files: static/\1/index.html
#   upload: static/(.+)/index.html
#   expiration: "15m"

# # site root
# - url: /
#   static_files: static/index.html
#   upload: static/index.html
#   expiration: "15m"

# ------------------------
# END STATIC FILE HANDLERS
# ------------------------

# Everything else.
- url: /.*
  script: _go_app
