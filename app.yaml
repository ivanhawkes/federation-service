application: ss-federation
version: 1
runtime: go
api_version: go1

handlers:
# Static folders
- url: /css
  static_dir: static/css
- url: /docs
  static_dir: static/docs
- url: /html
  static_dir: static/html
- url: /images
  static_dir: static/images
- url: /js
  static_dir: static/js

# Regex for all swagger files to make as static content.
# You should create the folder static/swagger and copy
# swagger-ui into it.
#
- url: /apidocs/(.*?)/(.*\.(js|html|css))
  static_files: static/swagger/\1/\2
  upload: static/swagger/(.*?)/(.*\.(js|html|css))

# Admin features
- url: /admin/.*
  script: _go_app
#  login: admin

# Some admin thing I think?
- url: /_ah/spi/.*
  script: _go_app

# Shard API
- url: /shard/.*
  script: _go_app

# Client API
- url: /my/.*
  script: _go_app
  login: required

# Everything else
- url: /.*
  script: _go_app
#  login: required

